<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManagerX — job-first pipeline: tailored CVs, onchain work agreements</title>
    <meta name="description" content="Scanner-fed Web3 job board. One-click CVs tailored to a single posting, and work agreements signed onchain on X Layer." />
    <script>
      // Apply theme before first paint to avoid a flash; toggle lives in the nav.
      const saved = localStorage.getItem("workos_theme");
      if (saved === "dark" || (!saved && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
