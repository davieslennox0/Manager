<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- ascending bars: benchmark / ranking, rising left to right -->
  <g>
    <rect x="140" y="288" width="58" height="96"  rx="22" fill="#ffffff" fill-opacity="0.60"/>
    <rect x="227" y="244" width="58" height="140" rx="22" fill="#ffffff" fill-opacity="0.78"/>
    <rect x="314" y="196" width="58" height="188" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  </g>

  <!-- growth arrow: career ascent, over the bars -->
  <g fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 268 L246 214 L330 156"/>
    <path d="M300 140 L344 148 L336 192"/>
  </g>
